name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      # 1. 更新 actions/checkout 从 v4 到 v6
      - uses: actions/checkout@v6

      # 2. 更新 pnpm/action-setup 从 v2 到 v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # 3. 更新 actions/setup-node 从 v4 到 v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Wrangler
        run: pnpm i -g wrangler

      - name: Run Deploy Script
        run: pnpm dlx tsx scripts/deploy.ts
        env:
          DISABLE_REGISTER: ${{ secrets.DISABLE_REGISTER }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
          AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
          D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
